<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <title>Song Information</title>
</head>
<body>
    <header>
        <div class="logo" onclick="redirectToHome()">ADAGIO<sup>&trade;</sup></div>
        <nav>
            <ul>
                <li><a href="#">About</a></li>
                <li class="dropdown">
                    <a href="#">Features</a>
                    <ul class="dropdown-menu">
                        <li><a href="#">Create Playlist</a></li>
                        <li><a href="#">Search History</a></li>
                        <li><a href="#">Find Similar Songs</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="song-info">
            <h2>Song Information</h2>
            <p><strong>Title:</strong> <span id="songTitle"></span></p>
            <p><strong>Artist:</strong> <span id="songArtist"></span></p>
            <p><strong>Album:</strong> <span id="songAlbum"></span></p>
            <p><strong>Genre:</strong> <span id="songGenre"></span></p> <!-- New line for Genre -->
        </div>

        <div class="video-player" id="videoPlayerContainer">
            <h2>Music Video</h2>
            <iframe
                id="videoPlayer"
                width="560"
                height="315"
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen
                src=""
            ></iframe>
        </div>

        <div class="lyrics-section">
            <h2>Lyrics</h2>
            <pre id="songLyrics" class="song-lyrics" style="white-space: pre-wrap;"></pre>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const title = urlParams.get('title');
            const artist = urlParams.get('artist');
            const album = urlParams.get('album');
            const genre = urlParams.get('genre');
            const lyrics = urlParams.get('lyrics');
            const videoUrl = urlParams.get('videoUrl'); // Get the YouTube video URL
    
            document.getElementById('songTitle').textContent = title;
            document.getElementById('songArtist').textContent = artist;
            document.getElementById('songAlbum').textContent = album;
            document.getElementById('songGenre').textContent = genre;
            document.getElementById('songLyrics').textContent = decodeURIComponent(lyrics);
    
            console.log("Embed YouTube Video URL:", videoUrl); // Log video URL in browser console
    
            if (videoUrl) {
                document.getElementById('videoPlayer').src = videoUrl;
                document.getElementById('videoPlayerContainer').style.display = 'block';
            } else {
                document.getElementById('videoPlayerContainer').innerHTML = '<p>Music video not available.</p>';
            }
        });
    </script>

    <script>
        // Load song information from URL parameters
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const title = urlParams.get('title');
            const artist = urlParams.get('artist');
            const album = urlParams.get('album');
            const genre = urlParams.get('genre'); // Retrieve genre from URL parameters
            const lyrics = urlParams.get('lyrics');
            const videoUrl = urlParams.get('videoUrl');
        
            document.getElementById('songTitle').textContent = title;
            document.getElementById('songArtist').textContent = artist;
            document.getElementById('songAlbum').textContent = album;
            document.getElementById('songGenre').textContent = genre; // Display the genre
            document.getElementById('songLyrics').textContent = decodeURIComponent(lyrics);
        
            if (videoUrl && videoUrl !== '') {
                const videoPlayer = document.getElementById('videoPlayer');
                videoPlayer.innerHTML = `<iframe width="560" height="315" src="${videoUrl}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                const videoPlayer = document.getElementById('videoPlayer');
                videoPlayer.innerHTML = '<p>Music video not available.</p>';
            }
        });
        function redirectToHome() {
            window.location.href = 'index.html';
        }
    </script>
    
</body>
</html>
