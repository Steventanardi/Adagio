<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <title>Sign In</title>
</head>
<body>
    <div class="auth-container">
        <div class="centered-container">
            <header>
                <div class="logo" onclick="redirectToHome()">ADAGIO<sup>&trade;</sup></div>
            </header>
            
            <div class="rounded-container">
                <h2 class="centered-text">Login to Your Account</h2>
                <p class="centered-text">Login using social networks</p>
                
                <!-- Social Media Buttons -->
                <div class="social-login">
                    <button class="social-btn fb-btn">f</button>
                    <button class="social-btn google-btn">G+</button>
                    <button class="social-btn linkedin-btn">in</button>
                </div>
                
                <p class="centered-text">OR</p>

                <form>
                    <input type="email" placeholder="Email" required class="input-field">
                    <input type="password" placeholder="Password" required class="input-field">
                    <!-- Modified Sign-In and Sign-Up Buttons in signin.html -->
                    <div class="button-container">
                        <button type="submit" class="submit">Sign In</button>
                        <button type="button" class="upsign" onclick="redirectToSignup()">Sign Up</button>
                    </div>

                </form>
            </div>
        </div>

        <!-- Sign-Up Invitation Commented Out -->
        <!-- 
        <div class="auth-right">
            <div class="signup-invitation">
                <h2>New Here?</h2>
                <p>Sign up and discover a great amount of new opportunities!</p>
                <a href="signup.html" class="signup">Sign Up</a>
            </div>
        </div>
        -->
    </div>

    <script>
        function redirectToHome() {
            window.location.href = 'index.html';
        }

        function redirectToSignup() {
        window.location.href = 'signup.html';
        }   
    </script>
</body>
</html>
