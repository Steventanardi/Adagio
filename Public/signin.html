<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Adagio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div class="sidebar">
        <div class="logo">A.</div>
        <a href="index.html" title="Home" data-i18n-title="nav.home"><i class="fas fa-home"></i></a>
        <a href="microphone.html" title="Microphone" data-i18n-title="nav.mic"><i class="fas fa-microphone"></i></a>
        <a href="indevice.html" title="System Audio" data-i18n-title="nav.indevice"><i class="fas fa-laptop"></i></a>
        <a href="upload.html" title="Upload File" data-i18n-title="nav.upload"><i class="fas fa-upload"></i></a>
        <a href="library.html" title="Library" data-i18n-title="nav.library"><i class="fas fa-heart"></i></a>
        <div class="spacer" style="flex-grow: 1;"></div>
        <a href="signup.html" class="active" title="Account" data-i18n-title="nav.account"><i
                class="fas fa-user-circle"></i></a>
    </div>

    <div class="main-content-wrapper">
        <div class="container" style="max-width: 500px;">
            <h1 data-i18n="auth.signin.title">Welcome Back</h1>
            <h2 data-i18n="auth.signin.subtitle">Sign in to access your library</h2>

            <div class="auth-card">
                <form id="signinForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="auth-btn" data-i18n="auth.btn.signin">Sign In</button>
                </form>
                <div class="auth-footer">
                    <a href="signup.html" data-i18n="auth.link.noAccount">Don't have an account? Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        document.getElementById('signinForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (response.ok) {
                    localStorage.setItem('adagio_token', result.token);
                    window.location.href = 'index.html';
                } else {
                    alert(result.message);
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('An error occurred during sign in.');
            }
        });
    </script>
</body>

</html>
