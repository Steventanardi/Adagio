<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdagioThesis | Intelligent Music Recognition</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div class="sidebar">
        <div class="logo">A.</div>
        <a href="index.html" class="active" title="Home" data-i18n-title="nav.home"><i class="fas fa-home"></i></a>
        <a href="microphone.html" title="Microphone" data-i18n-title="nav.mic"><i class="fas fa-microphone"></i></a>
        <a href="indevice.html" title="System Audio" data-i18n-title="nav.indevice"><i class="fas fa-laptop"></i></a>
        <a href="upload.html" title="Upload File" data-i18n-title="nav.upload"><i class="fas fa-upload"></i></a>
        <a href="library.html" title="Library" data-i18n-title="nav.library"><i class="fas fa-heart"></i></a>
        <div class="spacer"></div>
        <a href="signup.html" title="Account" data-i18n-title="nav.account"><i class="fas fa-user-circle"></i></a>
    </div>

    <div class="main-content-wrapper">
        <div class="hero">
            <h1>Hi I'm Adagio,</h1>
            <h2>Ask me any Music or Songs!</h2>

            <div class="mood-picker">
                <span class="mood-chip">🔥 Party</span>
                <span class="mood-chip">🌙 Chill</span>
                <span class="mood-chip">💻 Focus</span>
                <span class="mood-chip">💔 Sad</span>
                <span class="mood-chip">🚀 Hype</span>
            </div>

            <div class="search-container">
                <div class="search-input-wrapper">
                    <button id="humToggle" class="hum-toggle" title="Hum / Sing to Search">
                        <i class="fas fa-microphone-lines"></i> Hum Mode
                    </button>
                    <input type="text" id="searchInput" placeholder="Search for artists, songs, or lyrics...">
                    <button id="voiceSearchButton" class="voice-search-btn" title="Voice Search">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button id="intelligentSearchButton">Search</button>
                </div>
                <div id="historySection" class="history-section hidden">
                    <button id="toggleHistory" class="history-toggle">
                        <i class="fas fa-history"></i> Recent Searches <i class="fas fa-chevron-down"></i>
                    </button>
                    <div id="historyWrapper" class="history-wrapper collapsed">
                        <ul id="searchHistory" class="search-history"></ul>
                    </div>
                </div>
            </div>

            <div id="resultContainer" class="result-container">
                <!-- Recognition results will appear here -->
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
