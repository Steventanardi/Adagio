<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Music Recognition Website</title>
</head>
<body>
    <div class="top-bar">
        <h1>Music Recognition App</h1>
    </div>
    <div class="container">
        <div class="upload-section">
            <h2>Identify Your Music</h2>
            <input type="file" id="musicInput" accept="audio/*">
            <button id="identifyButton">Identify Song</button>
            <div id="result" class="result-box"></div>
        </div>
        <div class="live-section">
            <h2>Live Listening</h2>
            <button id="startListening">Start Listening</button>
            <button id="stopListening" disabled>Stop Listening</button>
            <div id="liveResult" class="result-box"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
