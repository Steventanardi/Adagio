<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <title>Music Recognition App</title>
</head>
<body>
    <header>
        <div class="logo" onclick="redirectToHome()">ADAGIO<sup>&trade;</sup></div>
        <nav>
            <ul>
                <li><a href="#">About</a></li>
                <li class="dropdown">
                    <a href="#">Features</a>
                    <ul class="dropdown-menu">
                        <li><a href="#">Create Playlist</a></li>
                        <li><a href="#">Search History</a></li>
                        <li><a href="#">Find Similar Songs</a></li>
                    </ul>
                </li>
                <li><a href="signin.html" class="sign-in-btn">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="floating-sphere-container">
            <div class="floating-sphere">
                <a href="#" class="sphere-button"></a>
                <div class="microphone-wave" style="display: none;"></div>
            </div>
        
            <div class="overlay">
                <h1>Hello, I'm Adagio.</h1>
                <p>Assistant for Music Recognition</p>
            </div>
        </div>  
    
        <div class="mic" style="display: none;">
            <i class="mic-icon"></i>
            <div class="mic-shadow"></div>
        </div>
        
        <div class="sound-wave">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </section>

    <!-- Container -->
    <div class="container">
        <div class="upload-section">
            <h2>Identify Your Music</h2>
            <input type="file" id="musicInput" accept="audio/*">
            <button id="identifyButton">Identify Song</button>
            <div id="result" class="result-box"></div>
        </div>

        <div class="live-section">
            <h2>Live Listening through Microphone</h2>
            <button id="startListeningMic">Start Listening through Microphone</button>
            <button id="stopListeningMic" disabled>Stop Listening through Microphone</button>
            <div id="liveResultMic" class="result-box"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Adagio</p>
    </footer>

    <script>
        function redirectToHome() {
            window.location.href = 'index.html';
        }
    </script>
    
    <script src="script.js"></script>
</body>
</html>
