<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- Include Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <title>Music Recognition App</title>
</head>
<body>
    <div class="sidebar">
        <div class="logo">A.</div>
        <a href="index.html"><i class="fas fa-home icon"></i></a>
        <a href="#"><i class="fas fa-user icon"></i></a>
        <a href="#"><i class="fas fa-envelope icon"></i></a>
        <a href="#"><i class="fas fa-cog icon"></i></a>
        <div class="spacer"></div>
        <a href="#"><i class="fas fa-sign-out-alt icon"></i></a>
    </div>    
    <!--
    <header>
        <div class="logo">ADAGIO</div>
        <nav>
            <ul>
                <li><a href="#" class="info-btn"><i class="fas fa-info-circle"></i></a></li>
            </ul>
        </nav>
        <div class="spacer"></div>
        <a href="signin.html" class="sign-in-btn"><i class="fas fa-user"></i></a>
    </header>
    -->
    

    <!-- Hero Section -->
    <div class="hero">
        <div class="intro-container">
            <!-- Greeting -->
            <div class="greeting">
                <h1>Hi I'm Adagio,</h1>
                <h2>What do you wanna learn?</h2>
            </div>
    
            <!-- Search Bar -->
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search..." />
                <button id="#intelligentSearchButton" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </div>    

    <!-- Container -->
    <div class="container">
        <div class="identify-container">
            <h2>Intelligent Music Search</h2>
            <input type="text" id="intelligentSearchInput" placeholder="Ask Adagio! (e.g., Recommend a jazz song)">
            <button id="#intelligentSearchButton">Search</button>
            <div id="result"></div>
        </div>
           
        <div class="music-player-container" id="musicPlayerContainer">
            <audio id="audioPlayer" controls>
                <source id="audioSource" src="" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <div class="player-info">
                <h3 id="trackTitle">Title: Not Playing</h3>
                <p id="trackArtist">Artist: Unknown</p>
            </div>
        </div>
        
        <div id="result"></div>
        
        <div class="recommendation-container">
            <h2>Recommended Music</h2>
            <div id="musicRecommendation">
                <!-- Music and video details will be injected here -->
            </div>
        </div>        
        <div class="live-section">
        
            <h2>Live Listening through Microphone</h2>
            <button id="startListeningMic">Start Listening through Microphone</button>
            <button id="stopListeningMic" disabled>Stop Listening through Microphone</button>
            <div id="liveResultMic" class="result-box"></div>
        </div>
        
    </div>

    <footer>
        <p>&copy; 2024 Adagio</p>
    </footer>

    <script>
        function redirectToHome() {
            window.location.href = 'index.html';
        }
    </script>
    
    <script src="script.js"></script>
</body>
</html>
