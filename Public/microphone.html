<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microphone Recognition | Adagio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="premium-bg">

    <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <div class="sidebar">
        <div class="logo">A.</div>
        <a href="index.html" title="Home" data-i18n-title="nav.home"><i class="fas fa-home"></i></a>
        <a href="microphone.html" class="active" title="Microphone" data-i18n-title="nav.mic"><i
                class="fas fa-microphone"></i></a>
        <a href="indevice.html" title="System Audio" data-i18n-title="nav.indevice"><i class="fas fa-laptop"></i></a>
        <a href="upload.html" title="Upload File" data-i18n-title="nav.upload"><i class="fas fa-upload"></i></a>
        <div class="spacer"></div>
        <a href="signup.html" title="Account" data-i18n-title="nav.account"><i class="fas fa-user-circle"></i></a>
    </div>

    <div class="main-content-wrapper">
        <div class="container">
            <h1 data-i18n="mic.title">Microphone</h1>
            <h2 data-i18n="mic.subtitle">Hum or play music to identify</h2>

            <div class="mic-ui-core">
                <div class="mic-aura mic-aura-1"></div>
                <div class="mic-aura mic-aura-2"></div>
                <div class="mic-aura mic-aura-3"></div>
                <canvas id="visualizer"></canvas>
                <button id="startListeningMic" class="premium-mic-btn">
                    <i class="fas fa-microphone"></i>
                    <span data-i18n="mic.btn.start">Start Listening</span>
                </button>
            </div>

            <p id="micStatus" style="color: var(--text-secondary); margin-bottom: 20px;" data-i18n="mic.status.ready">
                Tap to start listening</p>
        </div>

        <div id="liveResultMic" class="result-container">
            <!-- Live results will appear here -->
        </div>
    </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
