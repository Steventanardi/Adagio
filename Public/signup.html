<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- Include Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <title>Music Recognition App</title>
</head>
<body>
    <div class="sidebar">
        <div class="logo">A.</div>
        <a href="index.html"><i class="fas fa-home icon"></i></a>
        <a href="signin.html"><i class="fas fa-user icon"></i></a>
        <a href="microphone.html"><i class="fa-solid fa-microphone"></i></a>
        <a href="indevice.html"><i class="fas fa-laptop"></i></a>
        <a href="upload.html"><i class="fas fa-upload"></i></a>
        <a href="#"><i class="fas fa-cog icon"></i></a>
        <div class="spacer"></div>
        <a href="#"><i class="fas fa-sign-out-alt icon"></i></a>
    </div> 
    <div class="signup-container">
        <div class="signup-box">
            <h2>Sign Up</h2>
            <form>
                <input type="text" placeholder="Full Name" required class="signup-input" name="full_name">
                <input type="email" placeholder="Email Address" required class="signup-input" name="email">
                <input type="password" placeholder="Password" required class="signup-input" name="password">
                <input type="password" placeholder="Confirm Password" required class="signup-input">
                
                <button type="submit" class="signup-btn">Sign Up</button>
            </form>
            
            <p class="login-link">Already have an account? <a href="signin.html">Log in</a></p>
            
            <div class="divider">Or</div>
            
            <div class="social-signup">
                <button class="social-btn google-signup">Sign up with Google</button>
                <button class="social-btn facebook-signup">Sign up with Facebook</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
        
            if (data.password !== formData.get('confirm_password')) {
                alert('Passwords do not match');
                return;
            }
        
            const response = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        
            const result = await response.json();
            alert(result.message);
            if (response.ok) window.location.href = 'signin.html';
        });
    </script>

    <script>
        function redirectToHome() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
