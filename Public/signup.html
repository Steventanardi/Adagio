<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <title>Sign Up</title>
</head>
<body>
    <header>
        <div class="logo" onclick="redirectToHome()">ADAGIO<sup>&trade;</sup></div>
    </header>
    <div class="signup-container">
        <div class="signup-box">
            <h2>Sign Up</h2>
            <form>
                <input type="text" placeholder="Full Name" required class="signup-input" name="full_name">
                <input type="email" placeholder="Email Address" required class="signup-input" name="email">
                <input type="password" placeholder="Password" required class="signup-input" name="password">
                <input type="password" placeholder="Confirm Password" required class="signup-input">
                
                <button type="submit" class="signup-btn">Sign Up</button>
            </form>
            
            <p class="login-link">Already have an account? <a href="signin.html">Log in</a></p>
            
            <div class="divider">Or</div>
            
            <div class="social-signup">
                <button class="social-btn google-signup">Sign up with Google</button>
                <button class="social-btn facebook-signup">Sign up with Facebook</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
        
            if (data.password !== formData.get('confirm_password')) {
                alert('Passwords do not match');
                return;
            }
        
            const response = await fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        
            const result = await response.json();
            alert(result.message);
            if (response.ok) window.location.href = 'signin.html';
        });
    </script>

    <script>
        function redirectToHome() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
